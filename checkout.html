<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout - Bloomify</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <nav>
    <div class="logo">
      <img src="C:\Users\Dhivya\OneDrive\Pictures\logo.jpg" alt="Bloomify Logo">
      <span style="font-size:32px;"><i>Bloomify</i></span>
    </div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="shop.html">Shop</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
      <a href="cart.html">🛒 Cart (<span id="cart-count">0</span>)</a>
    </div>
  </nav>
</header>

<section class="section page">
  <h2>Checkout</h2>
  <div class="product-detail" style="margin-top:12px">
    <div>
      <h3>Shipping Details</h3>
      <form id="checkoutForm" class="contact-form">
        <input id="name" type="text" placeholder="Full Name" required>
        <input id="address" type="text" placeholder="Address" required>
        <input id="city" type="text" placeholder="City" required>
        <input id="pin" type="text" placeholder="PIN Code" required>
        <input id="phone" type="text" placeholder="Phone" required>
        <button class="btn" type="submit">Place Order</button>
      </form>
    </div>
    <div>
      <h3>Your Order</h3>
      <div id="checkoutSummary" class="cart-summary"></div>
    </div>
  </div>
</section>

<footer>
  <div class="footer-inner">
    <div>© 2025 Bloomify.</div>
    <div><span class="badge">Fresh Daily</span></div>
  </div>
</footer>

<script src="script.js"></script>
</body>
</html>
